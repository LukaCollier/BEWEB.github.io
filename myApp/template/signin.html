<!DOCTYPE html>
<html lang="en">
  {%include("layout/header.html") %}
  <body>
    <!-- Fixed navbar -->
    {%include("layout/nav.html") %}
    <!-- /.navbar -->

    <header id="head" class="secondary"></header>

    <!-- container -->
    <div class="container">
      <ol class="breadcrumb">
        <li><a href="/">Home</a></li>
        <li class="active">User access</li>
      </ol>

      <div class="row">
        <article class="col-xs-12 maincontent">
          <header class="page-header">
            <h1 class="page-title">Sign in</h1>
          </header>

          <div class="col-md-6 col-md-offset-3 col-sm-8 col-sm-offset-2">
            <div class="panel panel-default">
              <div class="panel-body">
                <h3 class="thin text-center">Sign in to your account</h3>
                <p class="text-center text-muted">
                  Pas encore de compte ?
                  <a href="/signup">S'inscrire</a>
                </p>
                <hr />

                <form method="POST" action="/signin">
                  <div class="top-margin">
                    <label>Email <span class="text-danger">*</span></label>
                    <input type="text" name="email" class="form-control" placeholder="votre@email.com" />
                  </div>
                  <div class="top-margin">
                    <label>Mot de passe <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" />
                  </div>

                  {% if error %}
                  <div class="top-margin">
                    <p style="color:red;">{{ error }}</p>
                  </div>
                  {% endif %}

                  <hr />

                  <div class="row">
                    <div class="col-lg-8">
                      <b><a href="">Mot de passe oublié ?</a></b>
                    </div>
                    <div class="col-lg-4 text-right">
                      <button class="btn btn-action" type="submit">
                        Sign in
                      </button>
                    </div>
                  </div>
                </form>

              </div>
            </div>
          </div>
        </article>
      </div>
    </div>
    <!-- /container -->

    {% include("layout/footer.html") %}

    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
    <script src="http://netdna.bootstrapcdn.com/bootstrap/3.0.0/js/bootstrap.min.js"></script>
    <script src="static/js/headroom.min.js"></script>
    <script src="static/js/jQuery.headroom.min.js"></script>
    <script src="static/js/template.js"></script>
  </body>
</html>
